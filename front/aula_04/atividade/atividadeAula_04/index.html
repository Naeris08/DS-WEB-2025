<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cachorro Persegue Mouse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cachorro"></div>

    <div id="timerTela" class="status-tela">
        <h1 id="contagem">Prepare-se!</h1>
        <p>Fuja do cachorro!</p>
    </div>

    <div id="gameOver" class="status-tela">
        <h1>GAME OVER!</h1>
        <p>O cachorro te alcançou!</p>
        <button onclick="location.reload()">Tentar de Novo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
